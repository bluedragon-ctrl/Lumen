<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lumen</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- Login screen: pick, create, claim, or delete a password-protected
       prospector before the game loads. Picking / creating / deleting opens the
       password modal below. The "Log in as Admin" entry is hideable via
       SHOW_ADMIN_LOGIN in server/config.js. Shown as a full-screen overlay until
       the server confirms authentication. -->
  <div id="login" class="login-screen" hidden>
    <div class="login-card">
      <h1 class="login-title">Lumen</h1>
      <p class="login-sub">A descent into light and dark. Choose your prospector.</p>
      <p id="login-msg" class="login-msg" hidden></p>

      <ul id="login-list" class="login-list" aria-label="Prospectors"></ul>

      <form id="login-create" class="login-create">
        <input id="login-name" type="text" autocomplete="off" autocapitalize="off"
               spellcheck="false" maxlength="20" placeholder="new prospector name" />
        <button type="submit" class="login-btn">Create</button>
      </form>

      <button id="login-admin" class="login-btn login-admin" type="button" hidden>Log in as Admin</button>
    </div>

    <!-- Password modal — one component drives log in, create, claim, and delete.
         The second (confirm) field and danger styling toggle by mode in app.js. -->
    <div id="login-auth" class="login-confirm" hidden>
      <form id="login-auth-form" class="login-card login-confirm-card">
        <p id="login-auth-title" class="login-confirm-text"></p>
        <p id="login-auth-msg" class="login-msg" hidden></p>
        <input id="login-auth-invite" type="text" autocomplete="off" autocapitalize="off"
               spellcheck="false" maxlength="200" placeholder="invitation key" hidden />
        <input id="login-auth-pw" type="password" autocomplete="off"
               maxlength="200" placeholder="password" />
        <input id="login-auth-pw2" type="password" autocomplete="off"
               maxlength="200" placeholder="confirm password" hidden />
        <div class="login-confirm-actions">
          <button id="login-auth-cancel" class="login-btn ghost" type="button">Cancel</button>
          <button id="login-auth-submit" class="login-btn" type="submit">Continue</button>
        </div>
      </form>
    </div>
  </div>

  <main id="app">
    <!-- Console: append-only event/history log -->
    <section id="console" class="pane" aria-label="Console">
      <div id="log"></div>
      <button id="jump-pill" type="button" hidden>↓ new messages</button>
    </section>

    <!-- Inspect: live view of the current room (tinted by light), or the
         examine view of a single entity when you look at / click something. -->
    <section id="inspect" class="pane light-unknown" aria-label="Room view">
      <div id="room-view">
        <header class="inspect-head">
          <span id="room-name">—</span>
          <span id="light-meter" class="light-meter">light: —</span>
        </header>
        <p id="room-desc" class="room-desc"></p>
        <div id="room-exits" class="row"></div>
        <div id="room-contents" class="contents"></div>
      </div>
      <div id="examine-view" hidden>
        <header class="inspect-head">
          <span id="ex-name">—</span>
          <span id="ex-rarity" class="rarity-badge" hidden></span>
          <span id="ex-kind" class="light-meter"></span>
          <button id="ex-back" class="ex-back" title="Back to the room view — or press Backspace">↩ room</button>
        </header>
        <p id="ex-desc" class="room-desc"></p>
        <div id="ex-bars"></div>
        <ul id="ex-lines" class="ex-lines"></ul>
        <div id="ex-hints" class="ex-hints"></div>
      </div>
    </section>

    <!-- Status strip: always-visible vitals -->
    <section id="status" class="status" aria-label="Status">
      <span class="stat" title="Health. You die at 0 and awaken at the rim."><label>HP</label><span class="bar"><i id="hp-fill"></i></span><b id="hp-val">—</b></span>
      <span class="stat" title="Magic fuel for spells."><label>Mana</label><span class="bar mana"><i id="mp-fill"></i></span><b id="mp-val">—</b></span>
      <span class="stat" id="sp-stat" title="Speed: action points regained per second. Higher = act more often."><label>Speed</label><b id="sp-val">—</b></span>
      <span class="stat tide-meter" id="tide-meter" hidden title="The Tide"><label>Tide</label><span id="tide-disc" class="tide-disc"></span><b id="tide-label" class="tide-label">—</b></span>
    </section>

    <!-- Command line -->
    <section id="commandbar" aria-label="Command input">
      <span class="prompt">&gt;</span>
      <input id="cmd" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
             placeholder='type a command — try "look", "down", "light", "help"' autofocus />
    </section>

    <!-- Player panel: stats, attributes, states, equipment, inventory -->
    <aside id="player" class="pane" aria-label="Player">
      <header class="player-head">
        <span id="p-name">—</span>
        <span id="p-level" class="muted">Lv —</span>
      </header>
      <div class="shards-line">
        <span id="p-shards" class="muted">—</span>
      </div>
      <div id="p-states" class="chips"></div>
      <dl id="p-attrs" class="attrs"></dl>
      <h3>Equipment</h3>
      <ul id="p-equip" class="list"></ul>
      <h3>Inventory</h3>
      <div id="inv-filters" class="inv-filter-bar">
        <button class="inv-filter active" data-group="all">All</button>
        <button class="inv-filter" data-group="gear">Gear</button>
        <button class="inv-filter" data-group="consumable">Use</button>
        <button class="inv-filter" data-group="material">Mats</button>
        <button class="inv-filter" data-group="other">Other</button>
      </div>
      <ul id="p-inv" class="list"></ul>
    </aside>
  </main>
  <script src="/app.js"></script>
</body>
</html>

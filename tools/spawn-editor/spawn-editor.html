<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lumen — room spawn editor</title>
<style>
  :root { --bg:#0b0d10; --panel:#12161b; --panel2:#171c23; --ink:#cdd3da; --dim:#8b95a1; --line:#252c35; --accent:#e0b15e; --good:#6fcf97; --bad:#e06f6f; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  header { padding:.6rem 1rem; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:1rem; }
  header h1 { font-size:15px; margin:0; color:var(--accent); font-weight:600; }
  header .sub { color:var(--dim); font-size:12px; }
  .wrap { display:grid; grid-template-columns:300px 1fr; height:calc(100vh - 49px); }
  aside { border-right:1px solid var(--line); overflow:auto; background:var(--panel); }
  aside input.filter { width:100%; border:0; border-bottom:1px solid var(--line); background:var(--panel2); color:var(--ink); padding:.5rem .75rem; font:inherit; outline:none; }
  ul.rooms { list-style:none; margin:0; padding:0; }
  ul.rooms li { padding:.4rem .75rem; cursor:pointer; border-bottom:1px solid #1b2128; display:flex; justify-content:space-between; gap:.5rem; align-items:center; }
  ul.rooms li:hover { background:var(--panel2); }
  ul.rooms li.active { background:#1d2530; color:var(--accent); }
  ul.rooms li.dirty .nm::after { content:" \25CF"; color:var(--accent); }
  ul.rooms li .id { color:var(--dim); font-size:11px; }
  ul.rooms li .count { color:var(--dim); font-size:11px; min-width:1.2em; text-align:right; }
  main { overflow:auto; padding:1rem 1.25rem; }
  .empty { color:var(--dim); margin-top:3rem; text-align:center; }
  .roomhead { margin:0 0 1rem; }
  .roomhead .t { color:var(--accent); font-size:16px; }
  .roomhead .d { color:var(--dim); font-size:12px; }
  table.spawns { width:100%; border-collapse:collapse; margin-bottom:1rem; }
  table.spawns th { text-align:left; color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.05em; padding:.3rem .5rem; border-bottom:1px solid var(--line); font-weight:500; }
  table.spawns td { padding:.3rem .5rem; vertical-align:middle; }
  table.spawns tr:hover td { background:var(--panel2); }
  input[type=text], input[type=number], select { background:var(--panel2); border:1px solid var(--line); color:var(--ink); border-radius:4px; padding:.35rem .5rem; font:inherit; outline:none; width:100%; }
  input:focus, select:focus { border-color:var(--accent); }
  td.num input { width:90px; }
  .hint { color:var(--dim); font-size:11px; }
  button { background:var(--accent); color:#1a1206; border:0; border-radius:5px; padding:.45rem .9rem; font:inherit; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; color:var(--ink); border:1px solid var(--line); }
  button.x { background:transparent; color:var(--bad); border:1px solid var(--line); padding:.2rem .55rem; }
  button.add { background:transparent; color:var(--good); border:1px dashed var(--line); }
  button:disabled { opacity:.5; cursor:default; }
  .bar { position:sticky; bottom:0; background:var(--panel); border-top:1px solid var(--line); padding:.75rem 1rem; margin:1rem -1.25rem -1rem; display:flex; gap:.75rem; align-items:center; flex-wrap:wrap; }
  .bar input.summary { flex:1; min-width:200px; }
  #out { margin-top:1rem; }
  pre.diff { background:#0e1116; border:1px solid var(--line); border-radius:6px; padding:.75rem; overflow:auto; max-height:340px; font-size:12px; }
  pre.diff .add { color:var(--good); } pre.diff .del { color:var(--bad); } pre.diff .hdr { color:var(--accent); }
  .msg { padding:.6rem .8rem; border-radius:6px; margin-top:.5rem; white-space:pre-wrap; }
  .msg.ok { background:#13241a; border:1px solid #244; color:var(--good); }
  .msg.err { background:#241313; border:1px solid #422; color:var(--bad); }
  .msg a { color:var(--accent); }
</style>
</head>
<body>
<header>
  <h1>Lumen &middot; room spawn editor</h1>
  <span class="sub">data/world/rooms.json &mdash; spawn rules (mob / max / respawn)</span>
  <span class="sub" id="dirtycount"></span>
</header>
<div class="wrap">
  <aside>
    <input class="filter" id="filter" placeholder="filter rooms&hellip;" autocomplete="off" />
    <ul class="rooms" id="list"></ul>
  </aside>
  <main id="main"><p class="empty">Loading rooms&hellip;</p></main>
</div>
<datalist id="mobids"></datalist>
<script>
let original = {};   // pristine rooms, parsed from disk
let rooms = {};      // working copy
let mobIds = [];     // for the mob datalist
let current = null;  // selected room id

const $ = (s, r=document) => r.querySelector(s);
const el = (tag, props={}, ...kids) => { const n = Object.assign(document.createElement(tag), props); for (const k of kids) n.append(k); return n; };
const clone = (o) => JSON.parse(JSON.stringify(o));
const spawnsOf = (id) => (rooms[id].spawns || []);
const eqSpawns = (id) => JSON.stringify(original[id].spawns || []) === JSON.stringify(rooms[id].spawns || []);

async function load() {
  const r = await (await fetch("/api/rooms")).json();
  original = r.rooms; rooms = clone(r.rooms); mobIds = r.mobIds || [];
  const dl = $("#mobids"); dl.textContent = "";
  for (const id of mobIds) dl.append(el("option", { value: id }));
  current = Object.keys(rooms)[0] || null;
  renderList(); renderForm();
}

function isDirty(id) { return !eqSpawns(id); }
function dirtyIds() { return Object.keys(rooms).filter(isDirty); }

function renderList() {
  const q = $("#filter").value.trim().toLowerCase();
  const ul = $("#list"); ul.textContent = "";
  for (const id of Object.keys(rooms)) {
    const room = rooms[id];
    if (q && !id.toLowerCase().includes(q) && !(room.name||"").toLowerCase().includes(q)) continue;
    const li = el("li", { className: (id===current?"active ":"") + (isDirty(id)?"dirty":"") });
    li.append(el("span", { className:"nm" }, (room.name||id)));
    li.append(el("span", { className:"id", textContent:id }));
    li.append(el("span", { className:"count", textContent: String((room.spawns||[]).length || "") }));
    li.onclick = () => { current = id; renderList(); renderForm(); };
    ul.append(li);
  }
  const n = dirtyIds().length;
  $("#dirtycount").textContent = n ? ("· " + n + " edited") : "";
}

function renderForm() {
  const main = $("#main"); main.textContent = "";
  if (!current) { main.append(el("p", { className:"empty", textContent:"No room selected." })); return; }
  const room = rooms[current];

  const head = el("div", { className:"roomhead" });
  head.append(el("div", { className:"t", textContent: (room.name || current) }));
  head.append(el("div", { className:"d", textContent: current + (room.zone ? "  ·  zone: " + room.zone : "") + "  ·  depth " + (room.depth ?? "?") }));
  main.append(head);

  main.append(spawnTable(room));

  main.append(el("p", { className:"hint", textContent: "max = population cap kept in this room. respawn = ticks between refills (1 tick = 1s); leave blank for a one-time spawn that never refills." }));

  main.append(actionBar());
  main.append(el("div", { id:"out" }));
}

function spawnTable(room) {
  room.spawns = room.spawns || [];
  const table = el("table", { className:"spawns" });
  const thead = el("tr");
  for (const h of ["mob", "max", "respawn", ""]) thead.append(el("th", { textContent: h }));
  table.append(thead);

  room.spawns.forEach((s, i) => table.append(spawnRow(room, s, i)));

  const addBtn = el("button", { className:"add", textContent:"+ add spawn rule" });
  addBtn.onclick = () => { room.spawns.push({ mob: mobIds[0] || "", max: 1 }); renderForm(); touch(); };
  const wrap = el("div"); wrap.append(table, addBtn);
  return wrap;
}

function spawnRow(room, s, i) {
  const tr = el("tr");
  // mob (with datalist of valid ids)
  const mob = el("input", { type:"text", value: s.mob ?? "", placeholder:"mob id" });
  mob.setAttribute("list", "mobids");
  mob.oninput = () => { s.mob = mob.value; touch(); };
  const mtd = el("td"); mtd.append(mob); tr.append(mtd);
  // max
  const max = el("input", { type:"number", min:"1", step:"1", value: s.max ?? "" });
  max.oninput = () => { if (max.value === "") delete s.max; else s.max = Number(max.value); touch(); };
  const xtd = el("td", { className:"num" }); xtd.append(max); tr.append(xtd);
  // respawn (optional)
  const resp = el("input", { type:"number", min:"0", step:"1", value: s.respawn ?? "", placeholder:"(none)" });
  resp.oninput = () => { if (resp.value === "") delete s.respawn; else s.respawn = Number(resp.value); touch(); };
  const rtd = el("td", { className:"num" }); rtd.append(resp); tr.append(rtd);
  // remove
  const del = el("button", { className:"x", textContent:"remove" });
  del.onclick = () => { room.spawns.splice(i, 1); renderForm(); touch(); };
  const dtd = el("td"); dtd.append(del); tr.append(dtd);
  return tr;
}

function actionBar() {
  const bar = el("div", { className:"bar" });
  const type = el("select", { id:"type" });
  for (const t of ["chore","fix","feat"]) type.append(el("option", { value:t, textContent:t }));
  const summary = el("input", { type:"text", className:"summary", id:"summary", placeholder:'commit summary (e.g. "faster rat respawn in the cellar")' });
  const validateBtn = el("button", { className:"ghost", textContent:"Validate & preview" });
  const prBtn = el("button", { textContent:"Create pull request" });
  validateBtn.onclick = () => save("validate", validateBtn, prBtn);
  prBtn.onclick = () => {
    if (!confirm("Write rooms.json, run the validator, then branch, commit, push, and open a PR. Continue?")) return;
    save("pr", validateBtn, prBtn);
  };
  bar.append(type, summary, validateBtn, prBtn);
  return bar;
}

function touch() { renderList(); }

async function save(mode) {
  const btns = Array.prototype.slice.call(arguments, 1);
  const out = $("#out"); out.textContent = "";
  btns.forEach((b) => b.disabled = true);
  out.append(el("p", { textContent:"Working…", style:"color:var(--dim)" }));
  try {
    const payload = { rooms, mode, summary: $("#summary").value, type: $("#type").value };
    const r = await (await fetch("/api/save", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) })).json();
    out.textContent = "";
    if (mode === "validate") return renderValidate(out, r);
    return renderPR(out, r);
  } catch (e) {
    out.textContent = ""; msg(out, "err", "Request failed: " + e.message);
  } finally {
    btns.forEach((b) => b.disabled = false);
  }
}

function renderValidate(out, r) {
  if (r.error) return msg(out, "err", r.error);
  if (!r.changed || !r.changed.length) return msg(out, "ok", "No spawn changes to save.");
  msg(out, r.ok ? "ok" : "err", (r.ok ? "✓ Validation passed. " : "✗ Validation FAILED. ") + "Changed rooms: " + r.changed.join(", ") + "\n\n" + (r.validate||""));
  if (r.diff) out.append(diffBlock(r.diff));
}
function renderPR(out, r) {
  if (r.ok) {
    const m = msg(out, "ok", "✓ Pull request opened on branch " + r.branch + "\nChanged rooms: " + (r.changed||[]).join(", ") + "\n");
    if (r.url) m.append(el("a", { href:r.url, target:"_blank", textContent:r.url }));
    return;
  }
  msg(out, "err", "✗ " + (r.error||"failed") + (r.validate ? "\n\n" + r.validate : ""));
}
function msg(out, kind, text) { const d = el("div", { className:"msg "+kind, textContent:text }); out.append(d); return d; }
function diffBlock(diff) {
  const pre = el("pre", { className:"diff" });
  for (const line of diff.split("\n")) {
    const cls = line.startsWith("+")&&!line.startsWith("+++") ? "add" : line.startsWith("-")&&!line.startsWith("---") ? "del" : (line.startsWith("@@")||line.startsWith("diff")||line.startsWith("index")) ? "hdr" : "";
    pre.append(el("span", { className:cls, textContent: line + "\n" }));
  }
  return pre;
}

$("#filter").addEventListener("input", renderList);
load();
</script>
</body>
</html>

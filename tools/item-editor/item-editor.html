<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lumen — item editor</title>
<style>
  :root { --bg:#0b0d10; --panel:#12161b; --panel2:#171c23; --ink:#cdd3da; --dim:#8b95a1; --line:#252c35; --accent:#e0b15e; --good:#6fcf97; --bad:#e06f6f; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  header { padding:.6rem 1rem; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:1rem; }
  header h1 { font-size:15px; margin:0; color:var(--accent); font-weight:600; }
  header .sub { color:var(--dim); font-size:12px; }
  .wrap { display:grid; grid-template-columns:260px 1fr; height:calc(100vh - 49px); }
  aside { border-right:1px solid var(--line); overflow:auto; background:var(--panel); }
  aside input.filter { width:100%; border:0; border-bottom:1px solid var(--line); background:var(--panel2); color:var(--ink); padding:.5rem .75rem; font:inherit; outline:none; }
  ul.items { list-style:none; margin:0; padding:0; }
  ul.items li { padding:.4rem .75rem; cursor:pointer; border-bottom:1px solid #1b2128; display:flex; justify-content:space-between; gap:.5rem; }
  ul.items li:hover { background:var(--panel2); }
  ul.items li.active { background:#1d2530; color:var(--accent); }
  ul.items li.dirty::after { content:"\25CF"; color:var(--accent); }
  ul.items li .id { color:var(--dim); font-size:11px; }
  main { overflow:auto; padding:1rem 1.25rem; }
  .empty { color:var(--dim); margin-top:3rem; text-align:center; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:.6rem 1rem; }
  fieldset { border:1px solid var(--line); border-radius:6px; margin:0 0 1rem; padding:.75rem 1rem 1rem; }
  legend { color:var(--accent); font-size:12px; padding:0 .4rem; text-transform:uppercase; letter-spacing:.06em; }
  label { display:flex; flex-direction:column; gap:.2rem; font-size:12px; color:var(--dim); }
  label.row { flex-direction:row; align-items:center; gap:.5rem; color:var(--ink); }
  input[type=text], input[type=number], textarea, select { background:var(--panel2); border:1px solid var(--line); color:var(--ink); border-radius:4px; padding:.35rem .5rem; font:inherit; outline:none; }
  input:focus, textarea:focus, select:focus { border-color:var(--accent); }
  textarea { width:100%; min-height:200px; resize:vertical; white-space:pre; }
  textarea#desc { min-height:64px; white-space:pre-wrap; }
  .full { grid-column:1/-1; }
  p.hint { color:var(--dim); font-size:11px; margin:.6rem 0 .2rem; line-height:1.4; }
  .bar { position:sticky; bottom:0; background:var(--panel); border-top:1px solid var(--line); padding:.75rem 1rem; margin:1rem -1.25rem -1rem; display:flex; gap:.75rem; align-items:center; flex-wrap:wrap; }
  .bar input.summary { flex:1; min-width:200px; }
  button { background:var(--accent); color:#1a1206; border:0; border-radius:5px; padding:.45rem .9rem; font:inherit; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; color:var(--ink); border:1px solid var(--line); }
  button:disabled { opacity:.5; cursor:default; }
  #out { margin-top:1rem; }
  pre.diff { background:#0e1116; border:1px solid var(--line); border-radius:6px; padding:.75rem; overflow:auto; max-height:340px; font-size:12px; }
  pre.diff .add { color:var(--good); } pre.diff .del { color:var(--bad); } pre.diff .hdr { color:var(--accent); }
  .msg { padding:.6rem .8rem; border-radius:6px; margin-top:.5rem; white-space:pre-wrap; }
  .msg.ok { background:#13241a; border:1px solid #244; color:var(--good); }
  .msg.err { background:#241313; border:1px solid #422; color:var(--bad); }
  .msg a { color:var(--accent); }
  .jsonerr { color:var(--bad); font-size:12px; min-height:1em; }
</style>
</head>
<body>
<header>
  <h1>Lumen &middot; item editor</h1>
  <span class="sub">data/world/items.json</span>
  <span class="sub" id="dirtycount"></span>
</header>
<div class="wrap">
  <aside>
    <input class="filter" id="filter" placeholder="filter items&hellip;" autocomplete="off" />
    <ul class="items" id="list"></ul>
  </aside>
  <main id="main"><p class="empty">Loading items&hellip;</p></main>
</div>
<script>
const KNOWN = ["id","name","description","type","slot","rarity","weight","value","sellValue","stackable","filterGroup","keywords"];
// Blocks that get their own structured section, so they're pulled out of the
// raw-JSON Advanced box (and protected from its delete-unknown-keys sweep).
const STRUCTURED = ["weapon"];
const NUMS = ["weight","value","sellValue"];
const TYPE_OPTS = ["light","weapon","armour","currency","treasure","material","consumable","scroll","recipe","book"];
const SLOT_OPTS = ["light","hand","body","head","neck","finger"];
const RARITY_OPTS = ["common","uncommon","rare","epic","legendary"];
const ATTR_OPTS = ["might","vitality","intellect","wits","perception"];

let original = {};   // pristine, parsed from disk
let items = {};      // working copy (mutated as you edit)
let current = null;  // selected item id

const $ = (s, r=document) => r.querySelector(s);
const el = (tag, props={}, ...kids) => { const n = Object.assign(document.createElement(tag), props); for (const k of kids) n.append(k); return n; };
const clone = (o) => JSON.parse(JSON.stringify(o));
const eq = (a,b) => JSON.stringify(a) === JSON.stringify(b);

async function load() {
  try {
    const res = await fetch("/api/items");
    if (!res.ok) throw new Error("HTTP " + res.status + " — is this served by the editor server?");
    const r = await res.json();
    original = r.items; items = clone(r.items);
    current = Object.keys(items)[0] || null;
    renderList(); renderForm();
  } catch (e) {
    $("#main").innerHTML = "";
    const p = el("p", { className:"empty" });
    p.append(el("div", { textContent:"Couldn't load items: " + e.message }));
    p.append(el("div", { style:"margin-top:.75rem", textContent:"Open this page from the item-editor server — run `npm run edit-items` and visit http://localhost:3941. It won't work through a static file or preview panel." }));
    $("#main").append(p);
  }
}

function isDirty(id) { return !eq(original[id], items[id]); }
function dirtyIds() { return Object.keys(items).filter(isDirty); }

function renderList() {
  const q = $("#filter").value.trim().toLowerCase();
  const ul = $("#list"); ul.textContent = "";
  for (const id of Object.keys(items)) {
    const it = items[id];
    if (q && !id.toLowerCase().includes(q) && !(it.name||"").toLowerCase().includes(q) && !(it.type||"").toLowerCase().includes(q)) continue;
    const li = el("li", { className: (id===current?"active ":"") + (isDirty(id)?"dirty":"") });
    li.append(el("span", {}, (it.name||id)));
    li.append(el("span", { className:"id", textContent:id }));
    li.onclick = () => { current = id; renderList(); renderForm(); };
    ul.append(li);
  }
  const n = dirtyIds().length;
  $("#dirtycount").textContent = n ? ("· " + n + " edited") : "";
}

function numInput(obj, key) {
  const i = el("input", { type:"number", value: obj[key] ?? "", step:"any" });
  i.oninput = () => {
    if (i.value === "") delete obj[key]; else obj[key] = Number(i.value);
    touch();
  };
  return i;
}

function renderForm() {
  const main = $("#main"); main.textContent = "";
  if (!current) { main.append(el("p", { className:"empty", textContent:"No item selected." })); return; }
  const it = items[current];

  // --- identity ---
  const ident = el("fieldset"); ident.append(el("legend", {}, "Identity"));
  const ig = el("div", { className:"grid" });
  ig.append(field("id", roInput(it.id)));
  ig.append(field("name", textInput(it, "name")));
  const descL = field("description", null, "full");
  const ta = el("textarea", { id:"desc", value: it.description ?? "" });
  ta.oninput = () => { it.description = ta.value; touch(); };
  descL.append(ta); ig.append(descL);
  ident.append(ig); main.append(ident);

  // --- classification ---
  const cls = el("fieldset"); cls.append(el("legend", {}, "Classification"));
  const clg = el("div", { className:"grid" });
  clg.append(field("type", selectInput(it, "type", TYPE_OPTS)));
  clg.append(field("slot (equippable items)", selectInput(it, "slot", SLOT_OPTS)));
  clg.append(field("rarity (default common)", selectInput(it, "rarity", RARITY_OPTS)));
  clg.append(field("filterGroup (e.g. consumable, other)", textInput(it, "filterGroup")));
  cls.append(clg);
  const flags = el("div", { className:"grid", style:"margin-top:.6rem" });
  flags.append(boolField(it, "stackable", false, "stackable — many to a slot (materials, ammo, currency)"));
  cls.append(flags);
  main.append(cls);

  // --- weapon (structured; shown for weapons) ---
  if (it.type === "weapon" || it.weapon) main.append(weaponSection(it));

  // --- trade & weight ---
  const trade = el("fieldset"); trade.append(el("legend", {}, "Trade & weight"));
  const tg = el("div", { className:"grid" });
  for (const k of NUMS) tg.append(field(k, numInput(it, k)));
  trade.append(tg);
  trade.append(el("p", { className:"hint", textContent:"Sell price = sellValue if set, else 20% of value. An item needs a truthy value to be sellable at all; currency (shards) is exempt from needing a value." }));
  main.append(trade);

  // --- keywords (extra nouns the parser matches) ---
  const kw = el("fieldset"); kw.append(el("legend", {}, "Keywords"));
  const kwL = field("comma-separated nouns the parser also matches (e.g. ring, band, glimmer)", null, "full");
  const kwI = el("input", { type:"text", value: (it.keywords||[]).join(", ") });
  kwI.oninput = () => {
    const arr = kwI.value.split(",").map((s) => s.trim()).filter(Boolean);
    if (arr.length) it.keywords = arr; else delete it.keywords;
    touch();
  };
  kwL.append(kwI); kw.append(kwL); main.append(kw);

  // --- advanced (raw JSON for the type-specific blocks) ---
  const advKeys = Object.keys(it).filter((k) => !KNOWN.includes(k) && !STRUCTURED.includes(k));
  const adv = el("fieldset"); adv.append(el("legend", {}, "Advanced — raw JSON (light, weapon, armour, consumable, scroll, recipe, teaches, …)"));
  const advObj = {}; for (const k of advKeys) advObj[k] = it[k];
  const at = el("textarea", { id:"adv", value: JSON.stringify(advObj, null, 2) });
  const err = el("div", { className:"jsonerr", id:"adverr" });
  at.oninput = () => {
    try {
      const parsed = at.value.trim() ? JSON.parse(at.value) : {};
      err.textContent = "";
      for (const k of Object.keys(it)) if (!KNOWN.includes(k) && !STRUCTURED.includes(k)) delete it[k]; // drop removed advanced keys (never the structured blocks)
      for (const k of Object.keys(parsed)) it[k] = parsed[k];
      touch();
    } catch (e) { err.textContent = "Invalid JSON: " + e.message; }
  };
  adv.append(at, err); main.append(adv);

  main.append(actionBar());
  main.append(el("div", { id:"out" }));
}

// The weapon block, edited as structured fields (so combat stats — damage,
// speed, scaling, crit, armour pierce — aren't buried in raw JSON). `weapon` is
// created lazily on first edit and pulled out of the Advanced box (STRUCTURED).
// onHit stays raw JSON: it's an open-ended effect array, like the other blocks.
function ensureWeapon(it) { return (it.weapon = it.weapon || {}); }

function weaponSection(it) {
  const fs = el("fieldset"); fs.append(el("legend", {}, "Weapon"));
  const g = el("div", { className:"grid" });
  g.append(field("damage — physical (dice, e.g. 1d8)", wpDmgInput(it, "physical")));
  g.append(field("damage — magical (dice; cut by Ward, not Armour)", wpDmgInput(it, "magical")));
  g.append(field("action cost (energy per swing; lower = faster)", wpNumInput(it, "actionCost", "1")));
  g.append(field("scale attribute (empty = default Might/4)", wpScaleAttr(it)));
  g.append(field("scale per (÷ this many points → +1 damage)", wpScalePer(it)));
  g.append(field("crit (flat chance 0–1, e.g. 0.05)", wpNumInput(it, "crit", "0.01")));
  g.append(field("armour pierce (Armour ignored before the physical soak)", wpNumInput(it, "pierce", "1")));
  fs.append(g);
  const flags = el("div", { className:"grid", style:"margin-top:.6rem" });
  flags.append(wpBoolField(it, "twoHanded", "two-handed — fills both hands, no shield alongside"));
  fs.append(flags);
  fs.append(el("p", { className:"hint", textContent:"Armour pierce only affects physical blows (Ward is untouched) and never drives the soak below zero — a blunt head cracking shell/plate. Leave the scale attribute empty to inherit the default Might/4 every weapon gets." }));
  // onHit — open-ended effect array, kept as raw JSON like the other blocks.
  const oh = field("onHit — effects on a landed hit (raw JSON array)", null, "full");
  const ta = el("textarea", { value: it.weapon && it.weapon.onHit ? JSON.stringify(it.weapon.onHit, null, 2) : "" });
  const err = el("div", { className:"jsonerr" });
  ta.oninput = () => {
    const t = ta.value.trim();
    if (t === "") { if (it.weapon) delete it.weapon.onHit; err.textContent = ""; return touch(); }
    try { ensureWeapon(it).onHit = JSON.parse(t); err.textContent = ""; touch(); }
    catch (e) { err.textContent = "Invalid JSON: " + e.message; }
  };
  oh.append(ta, err); fs.append(oh);
  return fs;
}
// A dice-string input for weapon.damage[dtype]; empties prune the sub-key (and
// the damage object when the last one goes) so no `"damage": {}` is left behind.
function wpDmgInput(it, dtype) {
  const cur = it.weapon && it.weapon.damage ? it.weapon.damage[dtype] : "";
  const i = el("input", { type:"text", value: cur ?? "", placeholder:"e.g. 1d8" });
  i.oninput = () => {
    const wp = ensureWeapon(it); wp.damage = wp.damage || {};
    if (i.value.trim() === "") delete wp.damage[dtype]; else wp.damage[dtype] = i.value.trim();
    if (!Object.keys(wp.damage).length) delete wp.damage;
    touch();
  };
  return i;
}
function wpNumInput(it, key, step) {
  const cur = it.weapon ? it.weapon[key] : "";
  const i = el("input", { type:"number", value: cur ?? "", step: step || "any" });
  i.oninput = () => { const wp = ensureWeapon(it); if (i.value === "") delete wp[key]; else wp[key] = Number(i.value); touch(); };
  return i;
}
function wpBoolField(it, key, label) {
  const c = el("input", { type:"checkbox", checked: !!(it.weapon && it.weapon[key]) });
  c.onchange = () => { const wp = ensureWeapon(it); if (c.checked) wp[key] = true; else delete wp[key]; touch(); };
  const l = el("label", { className:"row" }); l.append(c, el("span", {}, label || key)); return l;
}
// Scale is an {attr, per} pair. Clearing the attribute drops the whole block
// (so the weapon falls back to the default Might/4); picking one seeds per=4.
function wpScaleAttr(it) {
  const cur = it.weapon && it.weapon.scale ? it.weapon.scale.attr : "";
  const s = el("select");
  s.append(el("option", { value:"", textContent:"— default (Might/4) —" }));
  for (const a of ATTR_OPTS) s.append(el("option", { value:a, textContent:a, selected:a === cur }));
  s.onchange = () => {
    const wp = ensureWeapon(it);
    if (s.value === "") delete wp.scale;
    else { wp.scale = wp.scale || {}; wp.scale.attr = s.value; if (wp.scale.per == null) wp.scale.per = 4; }
    touch(); renderForm();
  };
  return s;
}
function wpScalePer(it) {
  const has = it.weapon && it.weapon.scale;
  const i = el("input", { type:"number", value: has ? it.weapon.scale.per ?? "" : "", step:"1", disabled: !has });
  if (!has) i.title = "Pick a scale attribute first.";
  i.oninput = () => { if (!it.weapon || !it.weapon.scale) return; if (i.value === "") delete it.weapon.scale.per; else it.weapon.scale.per = Number(i.value); touch(); };
  return i;
}

function field(text, control, cls) {
  const l = el("label", { className: cls || "" }); l.append(el("span", {}, text)); if (control) l.append(control); return l;
}
function roInput(v) { return el("input", { type:"text", value:v ?? "", readOnly:true, style:"opacity:.6" }); }
function textInput(obj, key) {
  const i = el("input", { type:"text", value: obj[key] ?? "" });
  i.oninput = () => { if (i.value === "") delete obj[key]; else obj[key] = i.value; touch(); };
  return i;
}
// A dropdown over `options`. An empty pick deletes the key; an out-of-list
// existing value is preserved (kept selectable) so the editor never silently
// drops a value it doesn't recognise.
function selectInput(obj, key, options) {
  const cur = obj[key];
  const opts = options.slice();
  if (cur != null && cur !== "" && !opts.includes(cur)) opts.unshift(cur);
  const s = el("select");
  s.append(el("option", { value:"", textContent:"— none —" }));
  for (const o of opts) s.append(el("option", { value:o, textContent:o, selected:o === cur }));
  s.onchange = () => { if (s.value === "") delete obj[key]; else obj[key] = s.value; touch(); };
  return s;
}
function boolField(obj, key, keepFalse, label) {
  const c = el("input", { type:"checkbox", checked: !!obj[key] });
  c.onchange = () => {
    if (c.checked) obj[key] = true;
    else if (keepFalse) obj[key] = false; else delete obj[key];
    touch();
  };
  const l = el("label", { className:"row" }); l.append(c, el("span", {}, label || key)); return l;
}

function actionBar() {
  const bar = el("div", { className:"bar" });
  const type = el("select", { id:"type" });
  for (const t of ["chore","fix","feat"]) type.append(el("option", { value:t, textContent:t }));
  const summary = el("input", { type:"text", className:"summary", id:"summary", placeholder:'commit summary (e.g. "buff iron-sword damage, drop torch value")' });
  const validateBtn = el("button", { className:"ghost", textContent:"Validate & preview" });
  const prBtn = el("button", { textContent:"Create pull request" });
  validateBtn.onclick = () => save("validate", validateBtn, prBtn);
  prBtn.onclick = () => {
    if (!confirm("Write items.json, run the validator, then branch, commit, push, and open a PR. Continue?")) return;
    save("pr", validateBtn, prBtn);
  };
  bar.append(type, summary, validateBtn, prBtn);
  return bar;
}

function touch() { renderList(); }

async function save(mode) {
  const btns = Array.prototype.slice.call(arguments, 1);
  const out = $("#out"); out.textContent = "";
  const jsonErr = Array.prototype.slice.call(document.querySelectorAll(".jsonerr")).find((e) => e.textContent);
  if (jsonErr) { return msg(out, "err", "Fix the invalid JSON highlighted above first."); }
  btns.forEach((b) => b.disabled = true);
  out.append(el("p", { className:"sub", textContent:"Working…", style:"color:var(--dim)" }));
  try {
    const payload = { items, mode, summary: $("#summary").value, type: $("#type").value };
    const r = await (await fetch("/api/save", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) })).json();
    out.textContent = "";
    if (mode === "validate") return renderValidate(out, r);
    return renderPR(out, r);
  } catch (e) {
    out.textContent = ""; msg(out, "err", "Request failed: " + e.message);
  } finally {
    btns.forEach((b) => b.disabled = false);
  }
}

function renderValidate(out, r) {
  if (r.error) return msg(out, "err", r.error);
  if (!r.changed || !r.changed.length) return msg(out, "ok", "No changes to save.");
  msg(out, r.ok ? "ok" : "err", (r.ok ? "✓ Validation passed. " : "✗ Validation FAILED. ") + "Changed: " + r.changed.join(", ") + "\n\n" + (r.validate||""));
  if (r.diff) out.append(diffBlock(r.diff));
}
function renderPR(out, r) {
  if (r.ok) {
    const m = msg(out, "ok", "✓ Pull request opened on branch " + r.branch + "\nChanged: " + (r.changed||[]).join(", ") + "\n");
    if (r.url) m.append(el("a", { href:r.url, target:"_blank", textContent:r.url }));
    return;
  }
  msg(out, "err", "✗ " + (r.error||"failed") + (r.validate ? "\n\n" + r.validate : ""));
}
function msg(out, kind, text) { const d = el("div", { className:"msg "+kind, textContent:text }); out.append(d); return d; }
function diffBlock(diff) {
  const pre = el("pre", { className:"diff" });
  for (const line of diff.split("\n")) {
    const cls = line.startsWith("+")&&!line.startsWith("+++") ? "add" : line.startsWith("-")&&!line.startsWith("---") ? "del" : (line.startsWith("@@")||line.startsWith("diff")||line.startsWith("index")) ? "hdr" : "";
    pre.append(el("span", { className:cls, textContent: line + "\n" }));
  }
  return pre;
}

$("#filter").addEventListener("input", renderList);
load();
</script>
</body>
</html>
